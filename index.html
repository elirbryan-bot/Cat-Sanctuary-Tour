.legend {
    max-width: 1000px;

    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}

.legend h2 {
    text-align: center;
    margin-bottom: 20px;
}

.legend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
}

.legend-grid a {
    display: block;
    text-decoration: none;
    background: #4CAF50;
    color: white;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    transition: 0.2s;
}

.legend-grid a:hover {
    background: #2E7D32;
    transform: scale(1.03);
}

</style>
